<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageVerse</title>
    <link rel="favicon" href="Logo">
    <!-- <script src="sign-in.js" defer type="module"></script> -->
    <link rel="stylesheet" href="./styles/nearby.css">
    <script src="https://cdn.tailwindcss.com"></script>


</head>

<body>
    <div class="head">
        <div class="logo">
            <a href="./services.html">
                <h1>VoyageVerse</h1>
            </a>
        </div>
        <div class="search">
            <input type="text" placeholder="Search destination">
            <button><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"
                    fill="rgba(255,255,255,1)">
                    <path fill="none" d="M0 0h24v24H0z"></path>
                    <path
                        d="M11 2C15.968 2 20 6.032 20 11C20 15.968 15.968 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2ZM11 18C14.8675 18 18 14.8675 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18ZM19.4853 18.0711L22.3137 20.8995L20.8995 22.3137L18.0711 19.4853L19.4853 18.0711Z">
                    </path>
                </svg></button>
        </div>
        <h3 id="Auth_Name">
        </h3>
    </div>
    <div class="main">
        <div class="title">
            <h2>Explore spots</h2>
            <h1>Try <span id="city">Nearest to you</span></h1>
        </div>
        <section class="text-gray-600 body-font relative">
            <div class="container px-5 py-24 mx-auto flex sm:flex-nowrap flex-wrap">
              <div class="lg:w-2/3 md:w-2 bg-gray-300 rounded-lg overflow-hidden sm:mr-10 p-10 flex items-end justify-start relative">
                <iframe width="100%" height="100%" class="absolute inset-0" frameborder="0" title="map" marginheight="0" marginwidth="0" scrolling="no" src="https://maps.google.com/maps?width=100%&height=600&hl=en&q=%C4%B0zmir+(My%20Business%20Name)&ie=UTF8&t=&z=14&iwloc=B&output=embed" style="filter: grayscale(1) contrast(1.2) opacity(0.4);"></iframe>
                <!-- <div class="bg-white relative flex flex-wrap py-6 rounded shadow-md">
                  <div class="lg:w-1/2 px-6">
                    <h2 class="title-font font-semibold text-gray-900 tracking-widest text-xs">ADDRESS</h2>
                    <p class="mt-1">Photo booth tattooed prism, portland taiyaki hoodie neutra typewriter</p>
                  </div>
                  <div class="lg:w-1/2 px-6 mt-4 lg:mt-0">
                    <h2 class="title-font font-semibold text-gray-900 tracking-widest text-xs">EMAIL</h2>
                    <a class="text-purple-500 leading-relaxed">example@email.com</a>
                    <h2 class="title-font font-semibold text-gray-900 tracking-widest text-xs mt-4">PHONE</h2>
                    <p class="leading-relaxed">123-456-7890</p>
                  </div>
                </div> -->
              </div>
              <div class="lg:w-1/3 md:w-1/2 bg-white flex flex-col md:ml-auto w-full md:py-8 mt-8 md:mt-0">
                <h2 class="text-gray-900 text-lg mb-1 font-medium title-font">Enter Location</h2>
                <p class="leading-relaxed mb-5 text-gray-600">Just enter location name to know about nearby places to explore !</p>
                <div class="relative mb-4">
                  <label for="location" class="leading-7 text-sm text-gray-600">Location</label>
                  <input type="text" id="autocomplete" name="location" class="w-full bg-white rounded border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out">
                </div>
                <div class="relative mb-4">
                  <label for="type" class="leading-7 text-sm text-gray-600">Type </label>
                  <select name="type" id="type">
                    <option value="" id="art_gallery">Art Gallery</option>
                    <option value="" id="aquarium">Aquarium</option>
                    <option value="" id="atm">ATM</option>
                    <option value="" id="bus_station">Bus Station</option>
                    <option value="" id="train_station">Train Station</option>
                    <option value="" id="book_store">Book Store</option>
                    <option value="" id="cafe">Cafe</option>
                    <option value="" id="campground">Camp Ground</option>
                    <option value="" id="supermarket">Super Makrket</option>
                    <option value="" id="university">university</option>
                    <option value="" id="travel_agency">Travel Agency</option>
                  </select>
                  <!-- <input type="text" id="type" name="type" class="w-full bg-white rounded border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out"> -->
                </div>
                
                <!-- <button class="text-white bg-purple-500 border-0 py-2 px-6 focus:outline-none hover:bg-purple-600 rounded text-lg">Search</button> -->
                <p class="text-xs text-gray-500 mt-3">All search results are fetched from Google Maps API</p>
              </div>
              <table class="table" id="places"></table>
            </div>
          </section>
    </div>
    <!-- <div class="footer">
        <h3>Made with ❤️ by a Traveller, for a Traveller</h3>
    </div> -->
</body>
<script>
    var a = localStorage.getItem("mail");
    document.getElementById("Auth_Name").innerHTML = ("Hi 🖐 , " + a);
</script>
<script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAv-GSblmUiH102EqDbRUlmuDr1bJG9DDg&loading=async&libraries=places&callback=initMap">
</script>
<script>
  function initMap(){
    autocomplete = new google.maps.places.Autocomplete((document.getElementById("autocomplete")),{
      types:['geocode']
    });
    autocomplete.addListener('place_changed', searchNearbyPlaces);
  }
  function searchNearbyPlaces(){
    document.getElementById('places').innerHTML=''

    var place = autocomplete.getPlace()
    console.log(place)
  }
  document.getElementById('type').onchange = searchNearbyPlaces;
</script>
</html>
